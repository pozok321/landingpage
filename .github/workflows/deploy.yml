name: Deploy Undangin App

# 1. Trigger: Jalankan setiap kali ada push ke branch 'main'
on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 2. Ambil kode terbaru dari repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 3. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 4. Install & Build (CI Stage)
      - name: Install dependencies
        run: npm install

      # - name: Run Tests (Vitest)
      #   run: npm run test

      - name: Build Nuxt App
        run: npm run build
        env:
          NUXT_PUBLIC_API_URL: ${{ secrets.API_URL }}

      # 5. Deploy ke Server (CD Stage)
      # Di sini kita menggunakan rsync untuk mengirim folder .output ke VPS
      - name: Deploy to VPS via SSH
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ".output/*"
          target: "/var/www/undangin-app"

      # 6. Restart App di Server
      - name: Restart PM2 Process
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/undangin-app
            pm2 restart undangin || pm2 start .output/server/index.mjs --name undangin